<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="配達員・逆襲のポチポチ — 通知を粉砕せよ。">
    <title>配達員・逆襲のポチポチ</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --surface2: #1e1e24;
            --border: #2a2a32;
            --accent: #00c853;
            --accent-dim: #00a844;
            --danger: #ff3d57;
            --warn: #ffb300;
            --text: #ececf1;
            --muted: #8b8b96;
            --phone-w: min(390px, 100vw - 24px);
        }

        body {
            min-height: 100dvh;
            background: #050507;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text);
            overflow: hidden;
        }

        /* スマホ筐体 */
        .phone {
            width: var(--phone-w);
            height: min(780px, 92dvh);
            background: var(--bg);
            border-radius: 36px;
            border: 3px solid #2c2c34;
            box-shadow:
                0 0 0 1px #111,
                0 24px 80px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #000;
            border-radius: 0 0 18px 18px;
            z-index: 100;
        }

        /* 配達アプリ風背景 — background-image で差し替え可能 */
        .app-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            /*
             * 実画像を使う場合は下のコメントを外してパスを指定:
             * background-image: url('delivery-bg.jpg');
             */
            background-image:
                linear-gradient(180deg, rgba(8,8,12,0.92) 0%, rgba(8,8,12,0.75) 40%, rgba(8,8,12,0.95) 100%),
                radial-gradient(ellipse at 50% 0%, rgba(0,200,83,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(255,61,87,0.05) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
            background-size: cover, cover, cover, 100% 40px;
            background-position: center;
            background-color: #0d0d12;
        }

        /* ステータスバー */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 36px 20px 8px;
            font-size: 0.72rem;
            color: var(--muted);
            z-index: 10;
        }

        .status-bar .time { font-weight: 600; color: var(--text); font-size: 0.85rem; }

        /* ヘッダー */
        .app-header {
            padding: 8px 20px 16px;
            z-index: 10;
        }

        .app-header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #fff 30%, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header .sub {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* スコア */
        .score-panel {
            margin: 0 16px 12px;
            padding: 14px 18px;
            background: rgba(22,22,26,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .score-label {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .score-value.bump {
            animation: scoreBump 0.35s ease;
        }

        @keyframes scoreBump {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.2); color: #fff; }
            100% { transform: scale(1); }
        }

        /* 通知エリア */
        .notification-zone {
            flex: 1;
            position: relative;
            margin: 0 12px;
            border-radius: 20px;
            overflow: hidden;
        }

        .zone-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.82rem;
            pointer-events: none;
            opacity: 0.6;
            text-align: center;
            padding: 20px;
            line-height: 1.6;
            z-index: 0;
        }

        /* 通知カード */
        .card {
            position: absolute;
            min-width: 200px;
            max-width: 260px;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05) inset;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            z-index: 5;
            animation: cardPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transition: transform 0.1s;
        }

        .card:active { transform: scale(0.96); }

        .card.type-money { border-left: 3px solid var(--accent); }
        .card.type-pin   { border-left: 3px solid var(--danger); }
        .card.type-order { border-left: 3px solid var(--warn); }
        .card.type-msg   { border-left: 3px solid #7c4dff; }

        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-app {
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-app .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.35;
            color: var(--text);
        }

        .card-time {
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 8px;
            text-align: right;
        }

        /* 粉砕エフェクト */
        .card.destroying {
            pointer-events: none;
            animation: destroyCard 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes destroyCard {
            0%   { transform: scale(1) rotate(0deg); filter: brightness(1); }
            20%  { transform: scale(1.15) rotate(-3deg); filter: brightness(2); }
            50%  { transform: scale(0.8) rotate(8deg); opacity: 1; }
            100% { transform: scale(0) rotate(25deg); opacity: 0; }
        }

        .smash-text {
            position: absolute;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow:
                0 0 10px #ff3d57,
                0 0 30px #ff3d57,
                0 0 60px rgba(255,61,87,0.6);
            pointer-events: none;
            z-index: 50;
            animation: smashPop 0.6s ease forwards;
            white-space: nowrap;
        }

        @keyframes smashPop {
            0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            30%  { opacity: 1; transform: scale(1.3) rotate(5deg); }
            70%  { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(1.5) rotate(10deg) translateY(-30px); }
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 49;
            animation: particleFly 0.5s ease forwards;
        }

        @keyframes particleFly {
            to {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,61,87,0.15);
            pointer-events: none;
            z-index: 40;
            animation: flashFade 0.3s ease forwards;
        }

        @keyframes flashFade {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        /* フッター */
        .app-footer {
            padding: 14px 20px 28px;
            background: rgba(10,10,12,0.95);
            border-top: 1px solid var(--border);
            text-align: center;
            z-index: 10;
        }

        .app-footer p {
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .invite-link {
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            color: #000;
            font-size: 0.88rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 12px;
            letter-spacing: 0.04em;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 20px rgba(0,200,83,0.3);
        }

        .invite-link:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(0,200,83,0.2);
        }

        .home-bar {
            width: 120px;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 12px auto 0;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        <div class="app-screen">
            <div class="status-bar">
                <span class="time" id="clock">--:--</span>
                <span>配達モード</span>
            </div>

            <header class="app-header">
                <h1>配達員・逆襲のポチポチ</h1>
                <p class="sub">通知をタップして粉砕せよ</p>
            </header>

            <div class="score-panel">
                <span class="score-label">粉砕数</span>
                <span class="score-value" id="score">0</span>
            </div>

            <div class="notification-zone" id="zone">
                <p class="zone-hint" id="hint">通知が来るのを待て…<br>来たら容赦なく粉砕だ</p>
            </div>

            <footer class="app-footer">
                <p>同じ苦しみを分かち合う仲間を募集してるぜ。</p>
                <a class="invite-link"
                   href="https://www.uber.com/signup/drive/deliver/?invite_code=mwxmfvc"
                   target="_blank"
                   rel="noopener noreferrer">＞＞ ここから一緒に稼ぐ ＜＜</a>
                <div class="home-bar"></div>
            </footer>
        </div>
    </div>

    <script>
        const CARDS = [
            { type: 'money', app: '配達アプリ', title: '100円: 階段3階' },
            { type: 'money', app: '配達アプリ', title: '80円: エレベーターなし5階' },
            { type: 'money', app: '配達アプリ', title: '120円: 駐禁で停められない' },
            { type: 'money', app: '配達アプリ', title: '50円: 雨の中待機' },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: クソ客' },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: 建物が見つからない' },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: 川の真ん中' },
            { type: 'order', app: '新規注文',   title: '3km先・30分以内・雨' },
            { type: 'order', app: '新規注文',   title: 'チャイム鳴らすな・即配達' },
            { type: 'order', app: '新規注文',   title: '置き配禁止・玄関前待機' },
            { type: 'msg',   app: 'サポート',   title: '遅延報告をしてください' },
            { type: 'msg',   app: 'サポート',   title: '評価が下がりました' },
            { type: 'msg',   app: '店舗',       title: 'まだできてないのに来た？' },
            { type: 'money', app: '配達アプリ', title: '100円: 階段3階（また）' },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: クソ客（再送）' },
        ];

        let smashCount = 0;
        let activeCards = 0;
        const MAX_CARDS = 5;
        const zone = document.getElementById('zone');
        const scoreEl = document.getElementById('score');
        const hint = document.getElementById('hint');

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }
        updateClock();
        setInterval(updateClock, 30000);

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function randomPos() {
            const pad = 8;
            const cardW = 220;
            const cardH = 90;
            const w = zone.clientWidth - cardW - pad * 2;
            const h = zone.clientHeight - cardH - pad * 2;
            return {
                left: pad + Math.random() * Math.max(w, 0),
                top:  pad + Math.random() * Math.max(h, 0)
            };
        }

        function spawnParticles(x, y) {
            const colors = ['#ff3d57', '#ffb300', '#00c853', '#fff', '#7c4dff'];
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.background = pick(colors);
                const angle = (Math.PI * 2 * i) / 12;
                const dist = 40 + Math.random() * 60;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                zone.appendChild(p);
                setTimeout(() => p.remove(), 550);
            }
        }

        function smashCard(card, e) {
            if (card.classList.contains('destroying')) return;

            const rect = card.getBoundingClientRect();
            const zoneRect = zone.getBoundingClientRect();
            const cx = rect.left - zoneRect.left + rect.width / 2;
            const cy = rect.top - zoneRect.top + rect.height / 2;

            card.classList.add('destroying');

            const flash = document.createElement('div');
            flash.className = 'flash-overlay';
            zone.appendChild(flash);
            setTimeout(() => flash.remove(), 300);

            const txt = document.createElement('div');
            txt.className = 'smash-text';
            txt.textContent = '粉砕！';
            txt.style.left = (cx - 40) + 'px';
            txt.style.top = (cy - 20) + 'px';
            zone.appendChild(txt);
            setTimeout(() => txt.remove(), 600);

            spawnParticles(cx, cy);

            smashCount++;
            scoreEl.textContent = smashCount;
            scoreEl.classList.remove('bump');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('bump');

            activeCards--;
            hint.style.opacity = activeCards > 0 ? '0' : '0.6';

            setTimeout(() => card.remove(), 550);
        }

        function spawnCard() {
            if (activeCards >= MAX_CARDS) return;

            const data = pick(CARDS);
            const pos = randomPos();
            const card = document.createElement('div');
            card.className = `card type-${data.type}`;
            card.style.left = pos.left + 'px';
            card.style.top = pos.top + 'px';
            card.innerHTML = `
                <div class="card-app"><span class="dot"></span>${data.app}</div>
                <div class="card-title">${data.title}</div>
                <div class="card-time">たった今</div>
            `;

            card.addEventListener('click', (e) => smashCard(card, e));
            zone.appendChild(card);
            activeCards++;
            hint.style.opacity = '0';
        }

        function scheduleSpawn() {
            const delay = 800 + Math.random() * 2200;
            setTimeout(() => {
                spawnCard();
                scheduleSpawn();
            }, delay);
        }

        scheduleSpawn();
        setTimeout(spawnCard, 400);
        setTimeout(spawnCard, 900);
    </script>
</body>
</html>
