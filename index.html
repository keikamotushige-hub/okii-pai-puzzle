<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Okie High Game</title>
    <style>
        body { 
            background: #000; 
            color: #d1d1d1; 
            text-align: center; 
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            min-height: 100vh;
            justify-content: center;
        }
        .container { 
            border: 3px solid #8b0000; 
            padding: 40px; 
            max-width: 500px; 
            width: 90%;
            background: #0a0a0a; 
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }
        h1 { color: #fff; letter-spacing: 5px; margin-bottom: 30px; font-size: 1.8rem; border-bottom: 2px solid #8b0000; padding-bottom: 10px; }
        #display-area { height: 120px; font-size: 1.2rem; margin: 30px 0; display: flex; align-items: center; justify-content: center; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #8b0000; color: #fff; border: none; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn:hover { background: #ff0000; }
        #score { font-size: 1.5rem; color: #ffd700; margin-top: 20px; font-weight: bold; }
        .footer-link { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; font-size: 0.9rem; color: #666; }
        .footer-link a { color: #888; text-decoration: none; border-bottom: 1px solid #444; }
        .footer-link a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Last Okie High Game</h1>
        <div id="display-area">「……シャバの300円、稼ぐ準備はいいか。」</div>
        <button class="btn" id="actionBtn" onclick="gameLogic()">置き配を実行する</button>
        <div id="score">稼ぎ：0円</div>
        
        <div class="footer-link">
            <p>筋の通った生き方をしたい奴は<br>
            <a href="https://www.uber.com/signup/drive/deliver/?invite_code=mwxmfvc" target="_blank">こちらから組織へ繋がれ</a></p>
        </div>
    </div>
    <script>
        let money = 0;
        let gameOver = false;
        const threats = [
            "「お前、置き場所が気に食わねえんだよ」と詰められた。",
            "「汁がこぼれてるぞ。落とし前はどうすんだ」と脅された。",
            "「面構えが気に食わねえ。落とし前、つけんのか？」と凄まれた。",
            "「お辞儀が浅いんじゃねえか？」と冷徹に指摘された。"
        ];
        function gameLogic() {
            if(gameOver) { location.reload(); return; }
            
            if (Math.random() < 0.35) {
                document.getElementById('display-area').innerText = threats[Math.floor(Math.random() * threats.length)];
                document.getElementById('actionBtn').innerText = "落とし前をつける";
                document.getElementById('actionBtn').onclick = resolve;
            } else {
                money += 300;
                document.getElementById('score').innerText = `稼ぎ：${money}円`;
                document.getElementById('display-area').innerText = "「……精々、死なねえ程度に稼ぐんだな。」";
            }
        }
        function resolve() {
            if(Math.random() > 0.5) {
                document.getElementById('display-area').innerText = "「次はねえぞ……失せろ。」";
                document.getElementById('actionBtn').innerText = "置き配を実行する";
                document.getElementById('actionBtn').onclick = gameLogic;
            } else {
                document.getElementById('display-area').innerText = "「甘いんだよ……。」――ゲームオーバー。";
                gameOver = true;
                document.getElementById('actionBtn').innerText = "再出航";
            }
        }
    </script>
</body>
</html>
